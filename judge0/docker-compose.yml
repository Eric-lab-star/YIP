# Self-hosted Judge0 CE — the sandbox that actually runs untrusted user code.
# The YIP app talks to it over REST at http://<host>:2358.
#
# Host prerequisites (Judge0 is picky — read judge0/README.md before `up`):
#   - Linux host with cgroup access; Judge0 containers run `privileged: true`.
#   - Follow the official install notes: https://github.com/judge0/judge0
#
# Quick start (local dev):
#   cp judge0/judge0.conf.example judge0/judge0.conf   # then edit secrets
#   docker compose -f judge0/docker-compose.yml up -d
#   curl http://localhost:2358/languages                # sanity check

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  redis:
    image: redis:7.2.4
    command:
      [
        "bash",
        "-c",
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: judge0.conf
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
